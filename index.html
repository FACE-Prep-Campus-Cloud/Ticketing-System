<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --accent:#1A3A6B;--accent-mid:#2563EB;--accent-lt:#3B82F6;--accent-pale:#DBEAFE;
    --page:#F8F5F0;--surface:#FFFFFF;--border:#DDD6CC;--border-soft:#EDE9E2;
    --text:#1C1C1E;--text-body:#5A5A6A;--text-muted:#8A8A9A;
    --gold:#D1A054;--gold-light:#E8BC78;--gold-pale:#F5E4C0;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
  @keyframes drift{from{transform:translateY(0) scale(1);}to{transform:translateY(32px) scale(1.04);}}
  @keyframes drift2{from{transform:translateY(0) scale(1);}to{transform:translateY(-24px) scale(0.97);}}
  @keyframes slowSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes sparkle{0%,100%{opacity:0;transform:scale(0);}50%{opacity:1;transform:scale(1);}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(8px,-12px) scale(1.05);}66%{transform:translate(-6px,8px) scale(0.96);}}
  @keyframes float2{0%,100%{transform:translate(0,0);}40%{transform:translate(-10px,14px);}75%{transform:translate(12px,-8px);}}
  @keyframes typeIn{from{width:0;border-color:var(--accent-mid);}to{width:100%;border-color:transparent;}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,99,235,0.35);}100%{box-shadow:0 0 0 16px rgba(37,99,235,0);}}
  @keyframes gridMove{from{background-position:0 0;}to{background-position:40px 40px;}}

  body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--page);min-height:100vh;}

  .auth-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:32px 16px;position:relative;overflow:hidden;
    background:linear-gradient(160deg,#EEF4FF 0%,#F8F5F0 45%,#FDF6EC 100%);
  }

  /* ─── animated grid bg ─── */
  .grid-bg{
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(37,99,235,0.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(37,99,235,0.06) 1px,transparent 1px);
    background-size:40px 40px;
    animation:gridMove 6s linear infinite;
    pointer-events:none;
  }

  /* ─── floating orbs ─── */
  .orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
  .orb1{width:480px;height:480px;background:rgba(37,99,235,0.14);top:-200px;right:-80px;animation:float1 12s ease-in-out infinite;}
  .orb2{width:340px;height:340px;background:rgba(209,160,84,0.18);bottom:-140px;left:-60px;animation:float2 15s ease-in-out infinite;}
  .orb3{width:220px;height:220px;background:rgba(59,130,246,0.12);top:35%;left:15%;animation:drift 10s ease-in-out infinite alternate;}
  .orb4{width:160px;height:160px;background:rgba(209,160,84,0.10);top:20%;right:20%;animation:drift2 9s ease-in-out infinite alternate;}

  /* ─── sparkle dots ─── */
  .spark{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--accent-mid);opacity:0;animation:sparkle var(--d,3s) ease-in-out var(--delay,0s) infinite;}

  /* ─── ring decoration ─── */
  .ring{position:absolute;border-radius:50%;border:1.5px dashed rgba(37,99,235,0.12);animation:slowSpin var(--speed,20s) linear infinite;pointer-events:none;}
  .ring1{width:420px;height:420px;top:50%;left:50%;transform:translate(-50%,-50%);--speed:28s;}
  .ring2{width:280px;height:280px;top:50%;left:50%;transform:translate(-50%,-50%);--speed:18s;animation-direction:reverse;}

  /* ─── auth box ─── */
  .auth-box{width:100%;max-width:460px;position:relative;z-index:2;animation:fadeUp 0.65s ease both;}
  .auth-header{text-align:center;margin-bottom:24px;}

  /* ─── logo area ─── */
  .logo-wrap{
    display:inline-flex;align-items:center;justify-content:center;
    gap:12px;margin-bottom:16px;
    background:rgba(255,255,255,0.70);border:1px solid rgba(37,99,235,0.12);
    border-radius:50px;padding:9px 18px;
    backdrop-filter:blur(12px);
    animation:fadeUp 0.5s ease 0.1s both;
  }
  .logo-dot{
    width:10px;height:10px;border-radius:50%;background:var(--accent-mid);
    animation:blink 1.8s ease-in-out infinite;
    flex-shrink:0;
  }
  .logo-label{
    font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.12em;
    text-transform:uppercase;color:var(--accent);
  }

  /* ─── hero headline ─── */
  .hero-headline{
    font-family:'Cormorant Garamond',serif;
    font-size:38px;line-height:1.14;font-weight:600;
    color:var(--accent);margin-bottom:12px;
    animation:fadeUp 0.6s ease 0.2s both;
  }
  .hero-headline em{font-style:italic;color:var(--accent-mid);}
  .hero-headline .brand-line{
    display:block;font-size:18px;font-weight:400;
    color:var(--gold);letter-spacing:0.04em;margin-bottom:6px;
    font-style:normal;
  }

  .hero-sub{
    font-size:13.5px;color:var(--text-body);line-height:1.65;
    max-width:340px;margin:0 auto 0;
    animation:fadeUp 0.6s ease 0.35s both;
  }

  /* ─── auth panel ─── */
  .auth-panel{
    background:rgba(255,255,255,0.90);border:1px solid var(--border);border-radius:10px;
    padding:24px 22px;box-shadow:0 8px 40px rgba(26,58,107,0.12);
    backdrop-filter:blur(20px);
    margin-top:22px;
    animation:fadeUp 0.65s ease 0.45s both;
  }
  label.field-label{
    display:block;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
    text-transform:uppercase;letter-spacing:0.1em;color:var(--text-body);margin-bottom:6px;
  }
  .field{margin-bottom:16px;}
  input,select{
    width:100%;padding:12px 14px;
    background:var(--page);border:1px solid var(--border);border-radius:5px;
    color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
    outline:none;transition:border-color .15s,box-shadow .15s;
    -webkit-appearance:none;appearance:none;
  }
  input:focus,select:focus{
    border-color:var(--accent-mid);
    box-shadow:0 0 0 3px rgba(37,99,235,0.12);
  }
  input::placeholder{color:var(--text-muted);}
  .btn-primary{
    width:100%;padding:14px 12px;background:var(--accent);color:#FFFFFF;
    border:none;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:15px;
    font-weight:600;cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:8px;transition:background .2s,transform .15s;
    letter-spacing:0.04em;margin-top:4px;
    animation:pulse 2.5s ease-out 1.5s infinite;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-primary:hover{background:var(--accent-mid);transform:translateY(-1px);}
  .btn-ghost{
    background:transparent;border:none;font-family:'DM Sans',sans-serif;
    font-size:13.5px;color:var(--text-body);cursor:pointer;width:100%;
    padding:12px 0 4px;transition:color .15s;text-align:center;display:block;margin-top:6px;
  }
  .btn-ghost:hover{color:var(--accent-mid);}

  .secure-note{display:flex;align-items:center;gap:8px;margin-top:18px;}

  /* ─── feature pills below panel ─── */
  .feature-row{
    display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap;
    animation:fadeUp 0.5s ease 0.85s both;
  }
  .fpill{
    font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.07em;text-transform:uppercase;
    color:var(--text-muted);background:rgba(255,255,255,0.70);border:1px solid var(--border-soft);
    border-radius:50px;padding:5px 12px;backdrop-filter:blur(6px);
  }

  /* ─── animated underline on brand line ─── */
  .underline-anim{
    position:relative;display:inline-block;
  }
  .underline-anim::after{
    content:'';position:absolute;bottom:-2px;left:0;height:2px;
    background:var(--gold-light);border-radius:2px;
    width:0;animation:typeIn 1.2s ease 0.8s forwards;
  }

  /* ───────────────────────────────────────────────
     MOBILE OPTIMIZATION
     This experience is designed mobile-first; the
     rules below tighten things up further on small
     phone screens so nothing crowds or overflows.
  ─────────────────────────────────────────────────*/
  @media (max-width: 480px){
    .auth-wrap{padding:20px 14px;align-items:flex-start;padding-top:36px;}
    .auth-box{max-width:100%;}
    .orb1{width:300px;height:300px;top:-140px;right:-100px;}
    .orb2{width:220px;height:220px;bottom:-100px;left:-60px;}
    .orb3{width:140px;height:140px;}
    .orb4{width:100px;height:100px;}
    .ring1{width:280px;height:280px;}
    .ring2{width:190px;height:190px;}

    .logo-wrap{padding:7px 14px;gap:8px;margin-bottom:14px;}
    .logo-label{font-size:10px;}

    .hero-headline{font-size:28px;line-height:1.18;}
    .hero-headline .brand-line{font-size:15px;margin-bottom:4px;}
    .hero-sub{font-size:13px;max-width:100%;padding:0 6px;}

    .auth-panel{padding:20px 16px;margin-top:18px;border-radius:8px;}
    .field{margin-bottom:14px;}
    input,select{padding:12px 13px;font-size:14.5px;}
    .btn-primary{padding:13px 12px;font-size:14.5px;}
    .btn-ghost{font-size:13px;}

    .secure-note span{font-size:11.5px;}
    .feature-row{gap:6px;margin-top:16px;}
    .fpill{font-size:9.5px;padding:4px 10px;}
  }

  @media (max-width: 360px){
    .hero-headline{font-size:25px;}
    .hero-headline .brand-line{font-size:14px;}
    .auth-panel{padding:18px 14px;}
  }
</style>

<div class="auth-wrap">
  <div class="grid-bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
  <div class="ring ring1"></div>
  <div class="ring ring2"></div>

  <!-- sparkle dots scattered -->
  <div class="spark" style="top:15%;left:12%;--d:4s;--delay:0s;"></div>
  <div class="spark" style="top:28%;right:14%;--d:3.5s;--delay:0.7s;background:var(--gold);"></div>
  <div class="spark" style="top:70%;left:8%;--d:5s;--delay:1.2s;"></div>
  <div class="spark" style="top:60%;right:10%;--d:3.2s;--delay:0.4s;background:var(--gold-light);"></div>
  <div class="spark" style="top:45%;left:5%;--d:4.5s;--delay:1.8s;width:4px;height:4px;"></div>
  <div class="spark" style="top:82%;right:18%;--d:3.8s;--delay:0.9s;width:4px;height:4px;"></div>
  <div class="spark" style="top:10%;right:30%;--d:4.2s;--delay:1.5s;width:5px;height:5px;background:var(--accent-lt);"></div>

  <div class="auth-box">
    <div class="auth-header">

      <div class="logo-wrap">
        <div class="logo-dot"></div>
        <span class="logo-label">Live Support Desk</span>
      </div>

      <h1 class="hero-headline">
        <span class="brand-line"><span class="underline-anim">FACE Prep Campus</span></span>
        One desk.<br><em>Every answer.</em>
      </h1>
      <p class="hero-sub">Log in with your roll number to Raise your Query or track one you've already filed.</p>
    </div>

    <div class="auth-panel">
      <div class="field">
        <label class="field-label">Roll Number</label>
        <input type="text" placeholder="e.g. 23CS045" />
      </div>
      <div class="field">
        <label class="field-label">Passcode <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:none;letter-spacing:0">(4-digit number)</span></label>
        <input type="password" placeholder="e.g. 1234" maxlength="4" />
      </div>
      <button class="btn-primary">Log in →</button>
      <button class="btn-ghost">New here? Create an account</button>

      <div class="secure-note">
        <svg style="width:14px;height:14px;stroke:var(--text-muted);fill:none;stroke-width:1.7;stroke-linecap:round;flex-shrink:0;" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span style="font-size:12px;color:var(--text-muted);">Your data is encrypted and accessible only to you and campus admin.</span>
      </div>
    </div>

    <div class="feature-row">
      <span class="fpill">Academics</span>
      <span class="fpill">Fees & Accounts</span>
      <span class="fpill">Hostel & Mess</span>
      <span class="fpill">Placements</span>
      <span class="fpill">+ more</span>
    </div>
  </div>
</div>
